title = "ArtVerse Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Known safe patterns — reviewed and approved"

paths = [
  ".env.example",
  "README.md",
  "specs/",
]

regexes = [
  "your[-_]secret[-_]here",
  "change[-_]me",
  "YOUR_API_KEY",
  "example\\.com",
  "local-dev-secret",
]

commits = []
