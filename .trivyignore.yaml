# Trivy v2 policy-format ignore file.
# Supersedes the legacy classic `.trivyignore`, which has been removed.
# Trivy's --ignorefile accepts a single file, so we unify here. Entries
# without a `paths` field suppress the CVE globally (same as the classic
# file did); entries with `paths` are scoped to that binary / file.
#
# Convention: new entries SHOULD include `paths` unless the CVE genuinely
# affects every copy of the vulnerable library in the image. Every entry
# MUST have a `statement` and `expired_at` so review is forced.
#
# Last reviewed: 2026-06-14 (issue #649)

vulnerabilities:
