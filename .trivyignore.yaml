# Trivy v2 policy-format ignore file.
# Supersedes the legacy classic `.trivyignore`, which has been removed.
# Trivy's --ignorefile accepts a single file, so we unify here. Entries
# without a `paths` field suppress the CVE globally (same as the classic
# file did); entries with `paths` are scoped to that binary / file.
#
# Convention: new entries SHOULD include `paths` unless the CVE genuinely
# affects every copy of the vulnerable library in the image. Every entry
# MUST have a `statement` and `expired_at` so review is forced.
#
# Last reviewed: 2026-04-23 (issue #540)

vulnerabilities:
  # ─── npm bundled dependencies (node:25-bookworm-slim) ───────────
  # These live inside the Node.js base image's built-in npm, not in
  # our project lockfile. Our lockfile already pins fixed versions;
  # these scans hit the *bundled* copies under
  # /usr/local/lib/node_modules/npm/... Nothing we can do until the
  # upstream Node base image rebuilds its npm bundle.
  # Global suppression mirrors the pre-migration classic file.

  - id: CVE-2024-21538
    statement: "cross-spawn 7.0.3 bundled inside npm base image (our lockfile: 7.0.6)."
    expired_at: 2026-10-23

