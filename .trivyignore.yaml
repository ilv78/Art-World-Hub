  # ─── NEW: drizzle-kit bundled esbuild Go stdlib (issue #540) ─────
  # Path-scoped because these specific CVEs only surface in the
  # drizzle-kit-nested esbuild (Go 1.23.12). Our top-level esbuild
  # 0.28.0 runs on Go 1.26.1 and is not flagged. drizzle-kit pins
  # esbuild ^0.25.x, so we cannot remediate until drizzle-kit bumps
  # its esbuild range to >= 0.26.
  #
  # The binary is drizzle-kit's internal JS bundler, invoked only at
  # build / migration time. It does not listen on any port, does not
  # handle user input, and is not reachable from request-path code.
  # Both CVEs are DoS vectors requiring an attacker-controlled TLS
  # peer — no such surface exists for this binary in our image.
  #
  # Revisit when drizzle-kit bumps esbuild >= 0.26.

  - id: CVE-2026-32281
    paths:
      - "app/node_modules/drizzle-kit/node_modules/@esbuild/linux-x64/bin/esbuild"
    statement: "Not runtime-reachable: drizzle-kit internal build tool, no TLS surface. Fix requires drizzle-kit to bump esbuild >= 0.26."
    expired_at: 2026-10-23

  - id: CVE-2026-32283
    paths:
      - "app/node_modules/drizzle-kit/node_modules/@esbuild/linux-x64/bin/esbuild"
    statement: "Not runtime-reachable: drizzle-kit internal build tool, no TLS surface. Fix requires drizzle-kit to bump esbuild >= 0.26."
    expired_at: 2026-10-23
