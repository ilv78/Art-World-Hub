name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SESSION_SECRET: ci-secret-not-for-production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  build-image:
    name: Build & Push Docker Image
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:${{ github.run_number }}
          build-args: |
            APP_VERSION=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-image
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync docker-compose to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: staging
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/staging/docker-compose.yml
          target: ~/app/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: staging
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            cd ~/app
            docker pull ghcr.io/ilv78/art-world-hub:$DEPLOY_SHA
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$DEPLOY_SHA/" .env || echo "IMAGE_TAG=$DEPLOY_SHA" >> .env
            # Ensure upload subdirs exist on the Docker volume (new subdirs may be missing)
            docker compose run --rm --no-deps --user root --entrypoint sh app -c "mkdir -p /app/uploads/artworks /app/uploads/blog-covers /app/uploads/avatars /app/logs && chown -R appuser:appgroup /app/uploads /app/logs"
            docker compose up -d --remove-orphans
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/health').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Staging is healthy after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed"
            docker compose logs --tail=50 app
            exit 1

      - name: Smoke test — health check
        run: |
          echo "Waiting for container to boot..."
          sleep 15
          HEALTH_URL="${{ secrets.STAGING_URL }}/health"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$HEALTH_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed — HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed — staging deployment verified"

      - name: Smoke test — logging infrastructure
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: staging
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/app
            echo "Checking log file exists..."
            docker compose exec -T app test -f /app/logs/app.log || { echo "FAIL: /app/logs/app.log not found"; exit 1; }
            echo "Checking log file has entries..."
            LOG_LINES=$(docker compose exec -T app wc -l < /app/logs/app.log)
            if [ "$LOG_LINES" -lt 1 ]; then
              echo "FAIL: log file is empty"
              exit 1
            fi
            echo "Checking logs are valid JSON..."
            docker compose exec -T app tail -1 /app/logs/app.log | python3 -c "import sys,json; json.load(sys.stdin)" || { echo "FAIL: last log line is not valid JSON"; exit 1; }
            echo "Checking startup log entries..."
            docker compose exec -T app grep -c '"msg":"Server listening"' /app/logs/app.log > /dev/null || { echo "FAIL: no Server listening entry"; exit 1; }
            echo "Logging smoke test passed — $LOG_LINES log entries, valid JSON"

      - name: Tag release in git
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "release-${{ github.run_number }}" "${{ github.sha }}"
          git push origin "release-${{ github.run_number }}"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          REPO_NAME: ${{ github.event.repository.name }}
          DEPLOY_SHA: ${{ github.sha }}
          TRIGGERED_BY: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          if [ "$DEPLOY_STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="@racu8_bot
          ${EMOJI} <b>Staging deployment: ${DEPLOY_STATUS}</b> [${REPO_NAME}]
          Staging address: https://staging.artverse.idata.ro
          Tag: <code>${DEPLOY_SHA}</code>
          Release: <code>release-${RUN_NUMBER}</code>
          By: ${TRIGGERED_BY}"
