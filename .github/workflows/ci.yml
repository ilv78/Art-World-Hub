name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, redesign/v3]
  merge_group:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SESSION_SECRET: ci-secret-not-for-production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Run tests
        run: npm test

      - name: Check migration drift
        run: |
          # Count migration files before and after running generate
          BEFORE=$(find migrations -name '*.sql' 2>/dev/null | wc -l)
          npx drizzle-kit generate
          AFTER=$(find migrations -name '*.sql' 2>/dev/null | wc -l)
          if [ "$AFTER" -gt "$BEFORE" ]; then
            echo "::error::Schema has changed but no migration was committed. Run 'npx drizzle-kit generate' locally and commit the result."
            git diff --stat
            exit 1
          fi
          echo "No migration drift detected"

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  changes:
    name: Detect Code Changes
    needs: ci
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/redesign/v3') && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      code: ${{ steps.filter.outputs.code }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - '!(specs/**|docs/**|**/*.md|.github/ISSUE_TEMPLATE/**)'

  build-image:
    name: Build & Push Docker Image
    needs: [ci, changes]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/redesign/v3') && github.event_name == 'push' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:${{ github.run_number }}
          build-args: |
            APP_VERSION=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    name: Trivy Container Scan
    needs: build-image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Pull image
        run: docker pull "${{ steps.image.outputs.name }}:${{ github.sha }}"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.30.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.yaml

  deploy-staging:
    name: Deploy to Staging
    needs: scan-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync docker-compose to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: staging
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/staging/docker-compose.yml
          target: ~/app/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: staging
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            cd ~/app
            docker pull ghcr.io/ilv78/art-world-hub:$DEPLOY_SHA
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$DEPLOY_SHA/" .env || echo "IMAGE_TAG=$DEPLOY_SHA" >> .env
            # Ensure upload subdirs exist on the Docker volume (new subdirs may be missing)
            docker compose run --rm --no-deps --user root --entrypoint sh app -c "mkdir -p /app/uploads/artworks /app/uploads/blog-covers /app/uploads/avatars /app/uploads/og-cards /app/logs && chown -R appuser:appgroup /app/uploads /app/logs"
            docker compose up -d --remove-orphans
            # Run pending database migrations
            echo "Running database migrations..."
            docker compose exec -T app npx drizzle-kit migrate || echo "Warning: migration failed or no pending migrations"
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/health').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Staging is healthy after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed"
            docker compose logs --tail=50 app
            exit 1

      - name: Smoke test — health check
        run: |
          echo "Waiting for container to boot..."
          sleep 15
          HEALTH_URL="${{ secrets.STAGING_URL }}/health"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$HEALTH_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed — HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed — staging deployment verified"

      - name: Smoke test — version and changelog
        run: |
          BASE_URL="${{ secrets.STAGING_URL }}"

          VERSION=$(curl --silent --fail "$BASE_URL/api/version" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$VERSION" ] || [ "$VERSION" = "unknown" ]; then
            echo "WARNING: /api/version returned '${VERSION:-empty}' — CHANGELOG.md may be missing from the image"
          else
            echo "Version check passed — $VERSION"
          fi

          CHANGELOG=$(curl --silent --fail "$BASE_URL/api/changelog" | head -30)
          if ! echo "$CHANGELOG" | grep -qE '## \[[0-9]+\.[0-9]+\.[0-9]+\]'; then
            echo "WARNING: /api/changelog has no version entries"
          else
            LATEST=$(echo "$CHANGELOG" | grep -oE '## \[[0-9]+\.[0-9]+\.[0-9]+\]' | head -1)
            echo "Changelog check passed — latest entry: $LATEST"
          fi

      - name: Smoke test — logging infrastructure
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: staging
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/app
            echo "Checking log file exists..."
            docker compose exec -T app test -f /app/logs/app.log || { echo "FAIL: /app/logs/app.log not found"; exit 1; }
            echo "Checking log file has entries..."
            LOG_LINES=$(docker compose exec -T app wc -l < /app/logs/app.log)
            if [ "$LOG_LINES" -lt 1 ]; then
              echo "FAIL: log file is empty"
              exit 1
            fi
            echo "Checking logs are valid JSON..."
            docker compose exec -T app tail -1 /app/logs/app.log | python3 -c "import sys,json; json.load(sys.stdin)" || { echo "FAIL: last log line is not valid JSON"; exit 1; }
            echo "Checking startup log entries..."
            docker compose exec -T app grep -c '"msg":"Server listening"' /app/logs/app.log > /dev/null || { echo "FAIL: no Server listening entry"; exit 1; }
            echo "Logging smoke test passed — $LOG_LINES log entries, valid JSON"

      - name: Tag release in git
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "release-${{ github.run_number }}" "${{ github.sha }}"
          git push origin "release-${{ github.run_number }}"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          REPO_NAME: ${{ github.event.repository.name }}
          DEPLOY_SHA: ${{ github.sha }}
          TRIGGERED_BY: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          if [ "$DEPLOY_STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="@racu8_bot
          ${EMOJI} <b>Staging deployment: ${DEPLOY_STATUS}</b> [${REPO_NAME}]
          Staging address: https://staging.vernis9.art
          Tag: <code>${DEPLOY_SHA}</code>
          Release: <code>release-${RUN_NUMBER}</code>
          By: ${TRIGGERED_BY}"

  deploy-preview:
    name: Deploy to Preview
    needs: scan-image
    if: github.ref == 'refs/heads/redesign/v3'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync docker-compose to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: preview
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/preview/docker-compose.yml
          target: ~/app/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: preview
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            cd ~/app
            docker pull ghcr.io/ilv78/art-world-hub:$DEPLOY_SHA
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$DEPLOY_SHA/" .env || echo "IMAGE_TAG=$DEPLOY_SHA" >> .env
            # Ensure upload subdirs exist on the Docker volume (new subdirs may be missing)
            docker compose run --rm --no-deps --user root --entrypoint sh app -c "mkdir -p /app/uploads/artworks /app/uploads/blog-covers /app/uploads/avatars /app/uploads/og-cards /app/logs && chown -R appuser:appgroup /app/uploads /app/logs"
            docker compose up -d --remove-orphans
            # Run pending database migrations (push mode, like staging)
            echo "Running database schema push..."
            docker compose exec -T app npx drizzle-kit push --force || echo "Warning: schema push failed"
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/health').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Preview is healthy after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed"
            docker compose logs --tail=50 app
            exit 1

      - name: Smoke test — health check
        env:
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "PREVIEW_URL secret not set, skipping external smoke test"
            exit 0
          fi
          echo "Waiting for container to boot..."
          sleep 15
          HEALTH_URL="${PREVIEW_URL}/health"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$HEALTH_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed — HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Health check passed — preview deployment verified"

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          REPO_NAME: ${{ github.event.repository.name }}
          DEPLOY_SHA: ${{ github.sha }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          if [ "$DEPLOY_STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="@racu8_bot
          ${EMOJI} <b>Preview deployment: ${DEPLOY_STATUS}</b> [${REPO_NAME}]
          Preview address: https://preview.vernis9.art
          Branch: redesign/v3
          Tag: <code>${DEPLOY_SHA}</code>
          By: ${TRIGGERED_BY}"
