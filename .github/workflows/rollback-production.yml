name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to roll back to (leave empty to use previous deploy)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          ROLLBACK_TAG: ${{ github.event.inputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: production
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ROLLBACK_TAG
          script: |
            cd ~/app

            # Determine which tag to roll back to
            if [ -z "$ROLLBACK_TAG" ]; then
              if [ ! -f .previous_image_tag ]; then
                echo "ERROR: No previous image tag found and none specified"
                exit 1
              fi
              ROLLBACK_TAG=$(cat .previous_image_tag)
              echo "Rolling back to previous tag: $ROLLBACK_TAG"
            else
              echo "Rolling back to specified tag: $ROLLBACK_TAG"
            fi

            # Save current tag as the new "previous" (so you can undo the rollback)
            CURRENT_TAG=$(grep '^IMAGE_TAG=' .env | cut -d= -f2 || true)
            if [ -n "$CURRENT_TAG" ] && [ "$CURRENT_TAG" != "$ROLLBACK_TAG" ]; then
              echo "$CURRENT_TAG" > .previous_image_tag
            fi

            # Pull and deploy the rollback image
            docker pull ghcr.io/ilv78/art-world-hub:$ROLLBACK_TAG
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$ROLLBACK_TAG/" .env || echo "IMAGE_TAG=$ROLLBACK_TAG" >> .env
            docker compose up -d --remove-orphans

            echo "Waiting for app to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/api/artists').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Production rolled back successfully after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after rollback"
            docker compose logs --tail=50 app
            exit 1

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          REPO_NAME: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'previous' }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          if [ "$DEPLOY_STATUS" = "success" ]; then EMOJI="⏪"; else EMOJI="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="@racu8_bot
          ${EMOJI} <b>Production rollback: ${DEPLOY_STATUS}</b> [${REPO_NAME}]
          Production address: https://artverse.idata.ro
          Tag: <code>${IMAGE_TAG}</code>
          By: ${TRIGGERED_BY}"
