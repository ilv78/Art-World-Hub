name: Release

on:
  workflow_dispatch:
    inputs:
      bump_override:
        description: "Version bump override (leave empty for auto-detect)"
        required: false
        type: choice
        options:
          - ""
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release
        id: prep
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BUMP_OVERRIDE: ${{ github.event.inputs.bump_override }}
        run: .github/scripts/prepare-release.sh

      - name: Exit if nothing to release
        if: steps.prep.outputs.skip == 'true'
        run: echo "No issues to release — exiting."

      - name: Create release branch and PR
        if: steps.prep.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.prep.outputs.tag }}
          VERSION: ${{ steps.prep.outputs.version }}
          BUMP_TYPE: ${{ steps.prep.outputs.bump_type }}
          CHANGELOG_BODY: ${{ steps.prep.outputs.changelog_body }}
          ISSUE_NUMBERS: ${{ steps.prep.outputs.issue_numbers }}
        run: |
          BRANCH="release/${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "release: ${TAG}"
          git push origin "$BRANCH"

          # Build PR body safely using printf (no shell expansion issues)
          {
            printf '## Release %s\n\n' "$TAG"
            printf '**Version:** %s\n' "$VERSION"
            printf '**Bump:** %s\n\n' "$BUMP_TYPE"
            printf '### Changelog\n\n'
            printf '%s\n\n' "$CHANGELOG_BODY"
            printf '<!-- RELEASE_ISSUES: %s -->\n' "$ISSUE_NUMBERS"
          } > /tmp/pr-body.md

          gh pr create \
            --title "release: ${TAG}" \
            --body-file /tmp/pr-body.md \
            --label "autorelease" \
            --base main \
            --head "$BRANCH"

      - name: Job summary
        if: steps.prep.outputs.skip != 'true'
        env:
          TAG: ${{ steps.prep.outputs.tag }}
          VERSION: ${{ steps.prep.outputs.version }}
          BUMP_TYPE: ${{ steps.prep.outputs.bump_type }}
          CHANGELOG_BODY: ${{ steps.prep.outputs.changelog_body }}
          ISSUE_NUMBERS: ${{ steps.prep.outputs.issue_numbers }}
        run: |
          {
            echo "## Release PR created: ${TAG}"
            echo ""
            echo "**Version:** ${VERSION}"
            echo "**Bump:** ${BUMP_TYPE}"
            echo "**Issues:** ${ISSUE_NUMBERS}"
            echo ""
            echo "Merge the PR to finalize the release (tag + GitHub Release created automatically)."
            echo ""
            echo "### Changelog"
            echo ""
            echo "${CHANGELOG_BODY}"
          } >> "$GITHUB_STEP_SUMMARY"
