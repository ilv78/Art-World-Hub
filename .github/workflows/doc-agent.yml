name: Documentation Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'   # Weekly Monday 08:00 UTC
  workflow_dispatch:

jobs:
  # --- ENFORCE MODE: Runs on PRs using Claude to analyze the diff ---
  enforce:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check for API key
        id: check-key
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: echo "has_key=$HAS_KEY" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.check-key.outputs.has_key == 'true'
        with:
          fetch-depth: 0

      - name: Run Documentation Agent (Enforce)
        if: steps.check-key.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1
        with:
          prompt: |
            You are the ArtVerse Documentation Agent in ENFORCE mode.
            Read specs/DOC-AGENT-SPEC.md for the full rule set, then analyze this PR.

            Check these rules against the PR diff:
            - C-001: PR adds a migration → specs/architecture/DATA-MODEL.md must be updated or ADR linked
            - C-002: PR adds a new Express route → feature spec must exist or be updated
            - C-003: PR changes CLAUDE.md → specs/decisions/DECISION-LOG.md needs an entry
            - C-004: PR title has "breaking-change" → ADR must be linked in description
            - C-005: Bug files with status Open >30 days need a ## Workaround section
            - S-001 to S-006: Required files must exist
            - Q-001 to Q-004: Quality checks on any spec files in the diff

            Post all findings as WARNINGS (not errors) — enforcement is not active yet.
            If a PR label matches "docs-skip: XX-NNN", skip that rule.

            Use this output format for your comment:

            ## 📋 Documentation Agent Report

            | Severity | Count |
            |---|---|
            | 🟡 Warnings | N |
            | 🟢 Info | M |

            ### Warnings
            - [ ] [RULE-ID] Description

            ### Info
            - [RULE-ID] Observation

            ---
            _Documentation Agent · [View Full Spec](specs/DOC-AGENT-SPEC.md)_

            If no issues found, just say:
            ## 📋 Documentation Agent Report
            ✅ All documentation rules pass. No issues found.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: true

      - name: Skip notice
        if: steps.check-key.outputs.has_key != 'true'
        run: echo "⏭️ Skipping doc agent enforce — ANTHROPIC_API_KEY not configured."

  # --- AUDIT MODE: Runs on push to main, weekly schedule, or manual trigger ---
  audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run Documentation Audit
        id: audit
        run: |
          REPORT=$(.github/scripts/doc-audit.sh 2>&1) || true
          echo "report<<AUDIT_EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "AUDIT_EOF" >> "$GITHUB_OUTPUT"

          # Count findings
          ERRORS=$(echo "$REPORT" | grep -cE '^\- \[ \] \[(S|C)-' || true)
          WARNINGS=$(echo "$REPORT" | grep -cE '^\- \[ \] \[ST-' || true)
          INFOS=$(echo "$REPORT" | grep -cE '^\- \[Q-' || true)
          ERRORS=${ERRORS:-0}
          WARNINGS=${WARNINGS:-0}
          INFOS=${INFOS:-0}
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          echo "infos=$INFOS" >> "$GITHUB_OUTPUT"
          echo "has_findings=$( [ $((ERRORS + WARNINGS + INFOS)) -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      # Single rolling audit issue model — see #415.
      # At most one open `docs-audit` issue exists at any time. Each audit
      # run either updates that issue (with findings) or closes it (when clean).
      - name: Find existing rolling audit issue
        id: find-existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "docs-audit" --state open --limit 1 --json number --jq '.[0].number // empty')
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING" ]; then
            echo "Found existing rolling audit issue: #$EXISTING"
          else
            echo "No existing rolling audit issue."
          fi

      - name: Comment on existing audit issue (findings + existing)
        if: steps.audit.outputs.has_findings == 'true' && steps.find-existing.outputs.existing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING: ${{ steps.find-existing.outputs.existing }}
          AUDIT_REPORT: ${{ steps.audit.outputs.report }}
        run: |
          gh issue comment "$EXISTING" --body "$AUDIT_REPORT"
          echo "Posted audit report comment on existing issue #$EXISTING"

      - name: Create rolling audit issue (findings + no existing)
        if: steps.audit.outputs.has_findings == 'true' && steps.find-existing.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUDIT_REPORT: ${{ steps.audit.outputs.report }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          gh issue create \
            --title "📋 Docs Audit (rolling)" \
            --label "docs-audit" \
            --assignee "$REPO_OWNER" \
            --body "$AUDIT_REPORT"
          echo "Created new rolling audit issue."

      - name: Close audit issues when audit is clean
        if: steps.audit.outputs.has_findings == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close ALL open docs-audit issues — defensive against races or
          # leftover duplicates from before the dedup fix landed.
          OPEN=$(gh issue list --label "docs-audit" --state open --limit 100 --json number --jq '.[].number')
          if [ -z "$OPEN" ]; then
            echo "✅ Documentation audit passed with no findings (nothing to close)."
            exit 0
          fi
          for n in $OPEN; do
            echo "Closing #$n (audit is now clean)"
            gh issue close "$n" --comment "✅ Documentation audit is now clean. Auto-closed by doc-agent workflow."
          done
