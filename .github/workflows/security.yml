name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  # schedule: paused pending new cadence — see issue #533
  # schedule:
  #   - cron: "0 8 * * 1"

permissions:
  contents: read
  pull-requests: write

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — SECRET SCANNING
  # Blocks if any secret, token, or key is found
  # anywhere in the commit history being pushed.
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # full history — gitleaks scans all commits in the push

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 2 — DEPENDENCY VULNERABILITY AUDIT
  # npm audit for known CVEs in dependencies.
  # Fails on critical or high severity findings.
  # ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit for critical and high vulnerabilities
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 3 — STATIC ANALYSIS (SEMGREP)
  # Scans source code for OWASP Top 10 patterns:
  # SQL injection, XSS, insecure JWT usage,
  # hardcoded secrets, prototype pollution, etc.
  # ─────────────────────────────────────────────
  sast:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/nodejs \
            --config p/typescript \
            --config p/jwt \
            --config p/secrets \
            --exclude="deploy/nginx/*" \
            --exclude-rule "yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag" \
            --exclude-rule "package_managers.dependabot.dependabot-missing-cooldown.dependabot-missing-cooldown" \
            --exclude-rule "package_managers.npm.npm-missing-minimum-release-age.npm-missing-minimum-release-age" \
            --error
          # The three excluded rules are supply-chain-hardening checks (SHA-pin
          # every action, dependabot cooldowns, npm minimum-release-age) that
          # landed in the registry packs mid-2026. They are out of scope for
          # this OWASP-focused app-security scan; proper hardening is tracked
          # separately (#671). Excluded to keep the SAST gate green. (#670)

  # ─────────────────────────────────────────────
  # JOB 4 — DOCKERFILE LINTING (HADOLINT)
  # Enforces Dockerfile best practices:
  # non-root USER, no latest tags, multi-stage
  # builds, no secrets in ENV/ARG, etc.
  # ─────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ─────────────────────────────────────────────
  # JOB 5 — CONTAINER IMAGE VULNERABILITY SCAN
  # Only runs on pushes to main (post-merge),
  # since it requires building the Docker image.
  # Scans OS packages + Node deps inside the image.
  # ─────────────────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    # Runs on PR + push + schedule. Previously gated to main-only, which let
    # auto-merge fire before Trivy ran — see #631 for the silent-failure
    # incident this fixes.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build -t artverse:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.30.0
        with:
          image-ref: artverse:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.yaml

  # ─────────────────────────────────────────────
  # JOB 6 — CUSTOM SECURITY CHECKS
  # Fast, targeted checks specific to ArtVerse:
  # - helmet middleware present
  # - rate limiter on auth routes
  # - .env never committed
  # - no security TODOs left open
  # ─────────────────────────────────────────────
  custom-checks:
    name: ArtVerse Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run custom security checks
        run: bash .github/scripts/security-checks.sh

  # ─────────────────────────────────────────────
  # SUMMARY — Required status check for branch
  # protection. All jobs must pass for this to
  # succeed. Add "Security / Gate" as the required
  # check in GitHub branch protection settings.
  # ─────────────────────────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - dependency-audit
      - sast
      - dockerfile-lint
      - custom-checks
      - container-scan
    if: always()
    steps:
      - name: Check all security jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more security checks failed. Merge is blocked."
            exit 1
          fi
          echo "All security checks passed."
