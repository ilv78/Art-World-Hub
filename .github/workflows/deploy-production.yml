name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (commit SHA or 'latest')"
        required: true
        default: "latest"

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: production
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/production/docker-compose.yml
          target: ~/app/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: production
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/app
            # Save current IMAGE_TAG for rollback
            CURRENT_TAG=$(grep '^IMAGE_TAG=' .env | cut -d= -f2 || true)
            if [ -n "$CURRENT_TAG" ] && [ "$CURRENT_TAG" != "${{ github.event.inputs.image_tag }}" ]; then
              echo "Saving current tag for rollback: $CURRENT_TAG"
              echo "$CURRENT_TAG" > .previous_image_tag
            fi
            docker pull ghcr.io/ilv78/art-world-hub:${{ github.event.inputs.image_tag }}
            sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.inputs.image_tag }}/' .env || echo 'IMAGE_TAG=${{ github.event.inputs.image_tag }}' >> .env
            docker compose up -d --remove-orphans
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/api/artists').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Production is healthy after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed"
            docker compose logs --tail=50 app
            exit 1

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${EMOJI} <b>Production Deploy: ${STATUS}</b>
          Tag: <code>${{ github.event.inputs.image_tag }}</code>
          By: ${{ github.actor }}
          <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View run</a>"
