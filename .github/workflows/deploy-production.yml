name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (commit SHA, run_number, or 'latest')"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync docker-compose to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: production
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/production/docker-compose.yml
          target: ~/app/
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: production
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            cd ~/app
            # Save current IMAGE_TAG for rollback
            CURRENT_TAG=$(grep '^IMAGE_TAG=' .env | cut -d= -f2 || true)
            if [ -n "$CURRENT_TAG" ] && [ "$CURRENT_TAG" != "$IMAGE_TAG" ]; then
              echo "Saving current tag for rollback: $CURRENT_TAG"
              echo "$CURRENT_TAG" > .previous_image_tag
            fi
            docker pull ghcr.io/ilv78/art-world-hub:$IMAGE_TAG
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env || echo "IMAGE_TAG=$IMAGE_TAG" >> .env
            # Ensure upload subdirs exist on the Docker volume (new subdirs may be missing)
            docker compose run --rm --no-deps --user root --entrypoint sh app -c "mkdir -p /app/uploads/artworks /app/uploads/blog-covers /app/uploads/avatars /app/logs && chown -R appuser:appgroup /app/uploads /app/logs"
            docker compose up -d --remove-orphans
            # Run pending database migrations
            echo "Running database migrations..."
            docker compose exec -T app npx drizzle-kit migrate || echo "Warning: migration failed or no pending migrations"
            echo "Waiting for app to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/health').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Production is healthy after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed"
            docker compose logs --tail=50 app
            exit 1

      - name: Smoke test — health check
        run: |
          echo "Waiting for container to boot..."
          sleep 15
          HEALTH_URL="${{ secrets.PRODUCTION_URL }}/health"
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$HEALTH_URL")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check failed — HTTP $HTTP_STATUS"
            echo "Triggering rollback..."
            exit 1
          fi
          echo "Health check passed — production deployment verified"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: production
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/app
            if [ ! -f .previous_image_tag ]; then
              echo "ERROR: No previous image tag found — cannot rollback"
              exit 1
            fi
            ROLLBACK_TAG=$(cat .previous_image_tag)
            echo "Rolling back to: $ROLLBACK_TAG"
            docker pull ghcr.io/ilv78/art-world-hub:$ROLLBACK_TAG
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$ROLLBACK_TAG/" .env
            docker compose up -d --remove-orphans
            echo "Waiting for rollback to be healthy..."
            for i in $(seq 1 60); do
              if docker compose exec -T app node -e "fetch('http://localhost:5000/health').then(r => { if (!r.ok) process.exit(1) })" 2>/dev/null; then
                echo "Rollback healthy after ${i}s"
                exit 0
              fi
              sleep 2
            done
            echo "Rollback health check failed"
            docker compose logs --tail=50 app
            exit 1

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          REPO_NAME: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then exit 0; fi
          if [ "$DEPLOY_STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="@racu8_bot
          ${EMOJI} <b>Production deployment: ${DEPLOY_STATUS}</b> [${REPO_NAME}]
          Production address: https://vernis9.art
          Tag: <code>${IMAGE_TAG}</code>
          By: ${TRIGGERED_BY}"
