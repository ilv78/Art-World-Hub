version: 2

updates:

  # ── npm dependencies ────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    groups:
      patch-updates:
        update-types:
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  # ── GitHub Actions ───────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(actions)"

  # ── Docker base image ────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Europe/Amsterdam"
    labels:
      - dependencies
    commit-message:
      prefix: "chore(docker)"
