server {
    listen 80;
    server_name vernis9.nl www.vernis9.nl;

    # Baseline security headers on the redirect response. HSTS is ignored by
    # browsers over HTTP (RFC 6797) but set for consistency; the other three
    # apply to the 301 response.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    return 301 https://vernis9.art$request_uri;
}
