# Custom nginx log format with latency + cache + size fields.
#
# Why: the default `combined` format omits $request_time,
# $upstream_response_time, $body_bytes_sent, and $upstream_cache_status,
# which makes p50/p95/p99 latency analysis and "user gave up vs server
# was fine" investigation impossible. See #548.
#
# Fields beyond `combined`:
#   rt   — total request time (client connect → last byte sent), seconds
#   urt  — upstream response time (Express app), seconds; "-" if no upstream
#   cs   — upstream cache status (HIT / MISS / BYPASS / EXPIRED / -)
#   gzr  — gzip compression ratio (e.g. 3.45); "-" if not compressed
#   bb   — body bytes sent to client (post-compression)
#
# ---------------------------------------------------------------------------
# Scope: this file is a PER-MACHINE asset, not a per-environment asset.
# Today staging and production share one nginx instance on a single VPS,
# so one copy of /etc/nginx/conf.d/log-format.conf serves both. If we ever
# split the envs onto separate machines, each machine's nginx gets its
# own copy — but a given machine still only needs one.
#
# Install (one-time per nginx host, requires sudo password — outside the
# deploy-nginx-config allowlist):
#
#   scp deploy/nginx/log-format.conf <env-user>@<host>:~/log-format.conf
#   ssh <env-user>@<host>
#     sudo cp ~/log-format.conf /etc/nginx/conf.d/log-format.conf
#     sudo chown root:root /etc/nginx/conf.d/log-format.conf
#     sudo chmod 644 /etc/nginx/conf.d/log-format.conf
#     sudo nginx -t && sudo nginx -s reload
#
# nginx loads /etc/nginx/conf.d/*.conf at http{} context BEFORE
# sites-enabled/*, so `log_format detailed` becomes available to every
# per-site `access_log ... detailed;` directive. See specs/workflows/
# DEPLOYMENT.md §5 for the full procedure and the shared-VPS-vs-split-host
# notes.
# ---------------------------------------------------------------------------

log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status bb=$body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time '
                    'cs=$upstream_cache_status gzr=$gzip_ratio';
