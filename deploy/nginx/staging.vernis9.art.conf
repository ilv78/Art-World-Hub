server {
    server_name staging.vernis9.art;

    # Strip trailing slash from non-root paths (SEO canonicalization parity with production)
    rewrite ^/(.+)/$ /$1 permanent;

    location / {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vernis9.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vernis9.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name staging.vernis9.art;
    return 301 https://staging.vernis9.art$request_uri;
}
