server {
    server_name vernis9.art;

    # Strip trailing slash from non-root paths (SEO canonicalization)
    rewrite ^/(.+)/$ /$1 permanent;

    # Baseline security headers (defense-in-depth: nginx-authoritative).
    # CSP, COOP, CORP, Origin-Agent-Cluster, etc. remain helmet's responsibility.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression for upstream responses. Express compresses HTML via middleware
    # but the static /assets/* bundles (~1.76 MB JS, 140 KB CSS) pass through
    # uncompressed. gzip_proxied any compresses them at the nginx layer; nginx
    # automatically skips any upstream response that already has Content-Encoding,
    # so HTML from Express is not re-compressed. (#550)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
      application/javascript
      application/json
      application/wasm
      application/xml
      image/svg+xml
      text/css
      text/javascript
      text/plain
      text/xml;

    # Vite content-hashed bundles — safe to lock for 1y immutable.
    # nginx add_header inheritance: defining add_header here cancels the
    # parent server's add_header inheritance, so the four baseline security
    # headers must be repeated. (#555)
    location /assets/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Cache-Control;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Uploaded artwork — UUID-keyed but not content-hashed. 30d cache;
    # not immutable so a re-upload at the same UUID can invalidate within
    # the cache window. (#555)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Cache-Control;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Suppress upstream (helmet) copies of the four nginx-owned headers to
        # avoid duplicate values on the client response.
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/vernis9.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vernis9.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# www → non-www redirect (HTTPS)
server {
    server_name www.vernis9.art;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/vernis9.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vernis9.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://vernis9.art$request_uri;
}

# HTTP → HTTPS redirect (both www and non-www)
server {
    listen 80;
    server_name vernis9.art www.vernis9.art;

    # HSTS is ignored by browsers over HTTP per RFC 6797, but set anyway for
    # consistency; the other three apply to the 301 response body.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    return 301 https://vernis9.art$request_uri;
}
