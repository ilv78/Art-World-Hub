server {
    server_name vernis9.art;

    # Strip trailing slash from non-root paths (SEO canonicalization)
    rewrite ^/(.+)/$ /$1 permanent;

    # Baseline security headers (defense-in-depth: nginx-authoritative).
    # CSP, COOP, CORP, Origin-Agent-Cluster, etc. remain helmet's responsibility.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Suppress upstream (helmet) copies of the four nginx-owned headers to
        # avoid duplicate values on the client response.
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vernis9.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vernis9.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# www → non-www redirect (HTTPS)
server {
    server_name www.vernis9.art;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vernis9.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vernis9.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://vernis9.art$request_uri;
}

# HTTP → HTTPS redirect (both www and non-www)
server {
    listen 80;
    server_name vernis9.art www.vernis9.art;

    # HSTS is ignored by browsers over HTTP per RFC 6797, but set anyway for
    # consistency; the other three apply to the 301 response body.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    return 301 https://vernis9.art$request_uri;
}
