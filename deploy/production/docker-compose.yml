name: artverse-production

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: artverse_production
      POSTGRES_USER: artverse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artverse -d artverse_production"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ghcr.io/ilv78/art-world-hub:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://artverse:${POSTGRES_PASSWORD}@db:5432/artverse_production
      SESSION_SECRET: ${SESSION_SECRET}
      SEED_DB: ${SEED_DB:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://accounts.google.com}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    ports:
      - 127.0.0.1:5002:5000

volumes:
  pgdata:
